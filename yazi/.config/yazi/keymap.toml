[manager]
keymap = [
    # Navigation
    { on = "k",     run = "arrow -1",         desc = "Move up" },
    { on = "j",     run = "arrow 1",          desc = "Move down" },
    { on = "h",     run = "leave",            desc = "Go to parent" },
    { on = "l",     run = "enter",            desc = "Enter directory / open file" },
    { on = "g g",   run = "arrow -9999999",   desc = "Jump to top" },
    { on = "G",     run = "arrow 9999999",    desc = "Jump to bottom" },

    # Selection
    { on = "<Space>", run = "select --state=none", desc = "Toggle selection" },
    { on = "v",       run = "visual_mode",          desc = "Enter visual mode" },
    { on = "V",       run = "select_all --state=none", desc = "Select all" },

    # File operations
    { on = "y", run = "yank",              desc = "Yank (copy)" },
    { on = "x", run = "yank --cut",        desc = "Yank (cut)" },
    { on = "p", run = "paste",             desc = "Paste" },
    { on = "d", run = "remove",            desc = "Move to trash" },
    { on = "r", run = "rename --cursor=before_ext", desc = "Rename" },
    { on = "a", run = "create",            desc = "Create file/dir" },

    # View
    { on = ".",   run = "hidden toggle",   desc = "Toggle hidden files" },
    { on = "z",   run = "plugin zoxide",   desc = "Jump via zoxide" },
    { on = "/",   run = "find",            desc = "Find" },
    { on = "s",   run = "search fd",       desc = "Search with fd" },
    { on = "S",   run = "search rg",       desc = "Search with ripgrep" },

    # Shell
    { on = "!",   run = "shell --block",   desc = "Run shell command (block)" },
    { on = "e",   run = "open --interactive", desc = "Open with..." },

    # Tabs
    { on = "t",     run = "tab_create --current", desc = "New tab" },
    { on = "[",     run = "tab_switch -1 --relative", desc = "Prev tab" },
    { on = "]",     run = "tab_switch  1 --relative", desc = "Next tab" },

    # Quit
    { on = "q", run = "quit",             desc = "Quit" },
    { on = "Q", run = "quit --no-cwd-file", desc = "Quit without saving cwd" },
]