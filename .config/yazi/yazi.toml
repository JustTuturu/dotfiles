[manager]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 1200
max_height = 900

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', block = true },
]
open = [
    { run = 'xdg-open "$@"' },
]

[open]
rules = [
    { mime = "text/*",        use = "edit" },
    { mime = "image/*",       use = "open" },
    { mime = "video/*",       use = "open" },
    { mime = "application/pdf", use = "open" },
    { mime = "*",             use = "open" },
]