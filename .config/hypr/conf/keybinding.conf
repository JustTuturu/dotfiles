# ═══════════════════════════════════════════════════════════════════
# ║  MAIN MOD KEY                                                     ║
# ═══════════════════════════════════════════════════════════════════
# 
$mainMod = SUPER

# ═══════════════════════════════════════════════════════════════════
# ║  APPLICATION LAUNCHERS                                            ║
# ═══════════════════════════════════════════════════════════════════

# Terminal (smart launch - raises minimized window)
bind = ALT, SPACE, exec, ~/.local/bin/app-launcher ghostty

# Browser (smart launch - raises minimized window)
bind = $mainMod, W, exec, ~/.local/bin/app-launcher brave

# File Manager (smart launch - raises minimized window)
bind = $mainMod, E, exec, ~/.local/bin/app-launcher nemo

# App Launcher (using rofi)
bind = $mainMod, TAB, exec, rofi -show drun

# Emoji picker
bind = $mainMod, PERIOD, exec, rofi -modi emoji -show emoji

# Clipboard history
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ═══════════════════════════════════════════════════════════════════
# ║  WINDOW MANAGEMENT                                                ║
# ═══════════════════════════════════════════════════════════════════

# Close window
bind = $mainMod, Q, killactive

# Toggle floating
bind = $mainMod, F, togglefloating

# Toggle fullscreen
bind = $mainMod, M, fullscreen

# Center window
bind = $mainMod, C, centerwindow

# Pin window (floating on top)
bind = $mainMod, P, pin

# Swap windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# ═══════════════════════════════════════════════════════════════════
# ║  FOCUS NAVIGATION                                                 ║
# ═══════════════════════════════════════════════════════════════════

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ═══════════════════════════════════════════════════════════════════
# ║  WORKSPACES                                                       ║
# ═══════════════════════════════════════════════════════════════════

# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ═══════════════════════════════════════════════════════════════════
# ║  LAYOUT CONTROLS                                                  ║
# ═══════════════════════════════════════════════════════════════════

# Toggle split direction
bind = $mainMod, Z, togglesplit

# ═══════════════════════════════════════════════════════════════════
# ║  MOUSE BINDINGS                                                   ║
# ═══════════════════════════════════════════════════════════════════

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════════
# ║  SCREENSHOTS (Windows-style)                                      ║
# ═══════════════════════════════════════════════════════════════════

# Screenshot region (like Windows Snip & Sketch)
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh region

# Screenshot full screen
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/scripts/screenshot.sh full

# Screenshot window
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/screenshot.sh window

# ═══════════════════════════════════════════════════════════════════
# ║  SESSION CONTROLS                                                 ║
# ═══════════════════════════════════════════════════════════════════

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Logout menu
bind = $mainMod SHIFT, F11, exec, wlogout

# Restart Hyprland
bind = $mainMod SHIFT, F12, exit

# ═══════════════════════════════════════════════════════════════════
# ║  FUNCTION KEYS                                                    ║
# ═══════════════════════════════════════════════════════════════════

# Media controls
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Volume
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ═══════════════════════════════════════════════════════════════════
# ║  NOCTALIA INTEGRATION                                           ║
# ═══════════════════════════════════════════════════════════════════

# Main IPC command
$ipc = qs -c noctalia-shell ipc call

# Core binds
bind = SUPER, SPACE, exec, $ipc launcher toggle
bind = SUPER, S, exec, $ipc controlCenter toggle
bind = SUPER, comma, exec, $ipc settings toggle

# Media keys
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease