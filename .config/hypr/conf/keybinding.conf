# ═══════════════════════════════════════════════════════════════════
# ║  MAIN MOD KEY                                                     ║
# ═══════════════════════════════════════════════════════════════════

# Main mod 
$mainMod = SUPER
# Main IPC command
$ipc = qs -c noctalia-shell ipc call

# ═══════════════════════════════════════════════════════════════════
# ║  APPLICATION LAUNCHERS                                            ║
# ═══════════════════════════════════════════════════════════════════

# Terminal (quick launch)
bind = $mainMod, SPACE, exec, $terminal

# Browser (quick launch)
bind = $mainMod, B, exec, $browser

# 9router Dashboard
bind = $mainMod, 9, exec, $browser http://localhost:20128/dashboard

# IDE Zed (quick launch)
bind = $mainMod, R, exec, zed

# File Manager Yazi (quick launch)  
bind = $mainMod, Y, exec, $terminal -e yazi

# ═══════════════════════════════════════════════════════════════════
# ║  NOCTALIA INTEGRATION                                           ║
# ═══════════════════════════════════════════════════════════════════

# Media keys
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl = , XF86AudioMute, exec, $ipc volume muteOutput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease

# Core binds
bind = SUPER, TAB, exec, $ipc launcher toggle
bind = SUPER, S, exec, $ipc controlCenter toggle
bind = SUPER, comma, exec, $ipc settings toggle

# ═══════════════════════════════════════════════════════════════════
# ║  WINDOW MANAGEMENT                                                ║
# ═══════════════════════════════════════════════════════════════════

# Close window
bind = $mainMod, Q, killactive

# Toggle floating
bind = $mainMod, F, togglefloating

# Toggle fullscreen
bind = $mainMod, M, fullscreen

# Center floating window
bind = $mainMod, C, centerwindow

# Toggle floating, then center
bind = $mainMod SHIFT, C, togglefloating

# Pin floating window on top
bind = $mainMod, P, pin

# Swap windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# ═══════════════════════════════════════════════════════════════════
# ║  FOCUS NAVIGATION                                                 ║
# ═══════════════════════════════════════════════════════════════════

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ═══════════════════════════════════════════════════════════════════
# ║  WORKSPACES                                                       ║
# ═══════════════════════════════════════════════════════════════════

# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ═══════════════════════════════════════════════════════════════════
# ║  LAYOUT CONTROLS                                                  ║
# ═══════════════════════════════════════════════════════════════════

# Toggle split direction (dwindle)
bind = $mainMod, Z, layoutmsg, togglesplit
# Swap split halves
bind = $mainMod SHIFT, Z, layoutmsg, swapsplit

# ═══════════════════════════════════════════════════════════════════
# ║  MOUSE BINDINGS                                                   ║
# ═══════════════════════════════════════════════════════════════════

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════════
# ║  SCREENSHOTS (Windows-style)                                      ║
# ═══════════════════════════════════════════════════════════════════

# Screenshot region (like Windows Snip & Sketch)
bind = $mainMod SHIFT, S, exec, hyprshot -m region

# Screenshot full screen
bind = $mainMod SHIFT, F, exec, hyprshot -m output

# Screenshot window
bind = $mainMod SHIFT, W, exec, hyprshot -m window

# ═══════════════════════════════════════════════════════════════════
# ║  SESSION CONTROLS                                                 ║
# ═══════════════════════════════════════════════════════════════════

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Restart Hyprland
bind = $mainMod SHIFT, F12, exit

# ═══════════════════════════════════════════════════════════════════
# ║  FUNCTION KEYS                                                    ║
# ═══════════════════════════════════════════════════════════════════

# Media controls
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop

# Volume
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
