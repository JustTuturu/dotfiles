#---------------------------------------------------------------------

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 5
    screencopy_mode = 0
    no_fade_in = false
    ignore_empty_input = true
    fail_timeout = 2000
}

background {
    monitor = 
    path = screenshot
    blur_passes = 3
    blur_size = 6
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

input-field {
    monitor = 
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(cba6f7aa)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
    check_color = rgba(a6e3a1aa)
    fail_color = rgba(f38ba8aa)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
}

label {
    monitor =
    text = $TIME
    color = rgba(cdd6f4ff)
    font_size = 64
    font_family = JetBrains Mono Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(a6adc8ff)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 120
    halign = center
    valign = center
}
