# 1. Environment variables
source = ~/.config/hypr/conf/environment.conf

# 2. Display / monitors
source = ~/.config/hypr/conf/monitors.conf

# 3. Programs (MUST come before keybinding ‚ÄĒ defines $terminal, $browser, etc.)
source = ~/.config/hypr/conf/programs.conf

# 4. Input
source = ~/.config/hypr/conf/input.conf

# 5. Animations
source = ~/.config/hypr/conf/animations.conf

# 6. Appearance / colors
source = ~/.config/hypr/conf/appearance.conf

# 7. Layout
source = ~/.config/hypr/conf/layout.conf

# 8. Keybindings (uses $terminal, $browser from programs.conf)
source = ~/.config/hypr/conf/keybinding.conf

# 9. Window rules
source = ~/.config/hypr/conf/windowrule.conf

# 10. Miscellaneous
source = ~/.config/hypr/conf/misc.conf

# 11. Autostart
source = ~/.config/hypr/conf/autostart.conf

# 12. Workspace-specific rules
source = ~/.config/hypr/conf/workspaces.conf

# 13. Noctalia settings
source = ~/.config/hypr/conf/noctalia.conf
