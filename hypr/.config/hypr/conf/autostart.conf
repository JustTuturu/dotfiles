#------------------------------------------------------------------------------

# ============================================
# Noctalia Shell (Quickshell-based)
# ============================================
exec-once = qs -c noctalia-shell
exec-once = swaync
exec-once = swww-daemon
exec-once = nm-applet --indicator

# Keyring
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

# 9Router AI Gateway
exec-once = /home/suzu/.hermes/node/bin/9router

# Input method
exec-once = fcitx5 -d --replace

# Screen sharing — XDG portals (critical on Fedora)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user start xdg-desktop-portal-hyprland
exec-once = systemctl --user start xdg-desktop-portal-gtk

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle management — lock & sleep
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user restart hypridle.service
exec-once = systemctl --user start hyprpolkitagent

# 9Router AI Gateway
exec-once = /home/suzu/.hermes/node/bin/9router
